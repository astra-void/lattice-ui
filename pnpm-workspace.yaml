packages:
  - packages/*/*
  - apps/*

# Security overrides: force patched versions of dev-only transitive deps
# flagged by Dependabot. All are build/test tooling, none ship to consumers.
overrides:
  undici: ^7.28.0
  vite: ^8.0.16
  esbuild: ^0.28.1
  fast-uri: ^3.1.2
  js-yaml@3: ^3.15.0

allowBuilds:
  esbuild: true

onlyBuiltDependencies:
  - esbuild

nodeLinker: hoisted