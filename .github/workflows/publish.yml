name: Publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to publish, for example v0.4.4 or v0.4.4-alpha.1
        required: true
        type: string
      dry_run:
        description: Run a dry-run publish instead of publishing to npm
        required: false
        default: true
        type: boolean

permissions:
  contents: read
  id-token: write

env:
  NODE_VERSION: 24
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: publish
    runs-on: ubuntu-latest
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync workspace metadata
        run: pnpm run workspace:sync

      - name: Ensure no pending changesets remain
        run: |
          pending_changesets="$(find .changeset -maxdepth 1 -type f -name '*.md' ! -name 'README.md')"
          if [ -n "${pending_changesets}" ]; then
            echo "Pending changesets must be versioned before publish:" >&2
            echo "${pending_changesets}" >&2
            exit 1
          fi

      - name: Run checks
        run: pnpm run check

      - name: Run build
        run: pnpm run build

      - name: Resolve release metadata
        id: release
        env:
          RELEASE_TAG: ${{ env.RELEASE_TAG }}
        run: |
          if [ -z "${RELEASE_TAG}" ]; then
            echo "RELEASE_TAG is required." >&2
            exit 1
          fi

          echo "Using release tag: ${RELEASE_TAG}"
          pnpm run release:resolve -- --tag "${RELEASE_TAG}" --github-output "${GITHUB_OUTPUT}"

      - name: Dry-run publish
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run }}
        env:
          NPM_PUBLISH_TAG_ARGS: ${{ steps.release.outputs.npm_publish_tag_args }}
        run: |
          pnpm run release:publish:dry-run:ci -- ${NPM_PUBLISH_TAG_ARGS}

      - name: Publish packages
        if: ${{ github.event_name == 'push' || !inputs.dry_run }}
        env:
          NPM_PUBLISH_TAG_ARGS: ${{ steps.release.outputs.npm_publish_tag_args }}
        run: |
          pnpm run release:publish:ci -- ${NPM_PUBLISH_TAG_ARGS}

      - name: Upload publish summary
        if: ${{ always() && hashFiles('pnpm-publish-summary.json') != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: pnpm-publish-summary
          path: pnpm-publish-summary.json
